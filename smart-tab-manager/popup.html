<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #253449;
      --border: #334155; --text: #e2e8f0; --text-muted: #94a3b8; --text-dim: #64748b;
      --primary: #6366f1; --primary-light: #818cf8;
      --success: #22c55e; --error: #ef4444; --warn: #eab308;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); width: 380px; min-height: 500px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .logo { font-size: 14px; font-weight: 800; }
    .logo span { color: var(--primary-light); }
    .tab-count { font-size: 12px; color: var(--text-muted); background: var(--bg-card); padding: 2px 8px; border-radius: 10px; }
    
    /* Tabs nav */
    .nav { display: flex; border-bottom: 1px solid var(--border); }
    .nav button { flex: 1; padding: 8px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .nav button.active { color: var(--primary-light); border-bottom-color: var(--primary); }
    .nav button:hover { color: var(--text); }
    
    /* Actions bar */
    .actions { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .action-btn { flex: 1; padding: 6px 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 11px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .action-btn:hover { border-color: var(--primary); color: var(--text); background: var(--bg-hover); }
    .action-btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
    .action-btn.danger { border-color: var(--error); color: var(--error); }
    
    /* Tab list */
    .tab-list { max-height: 350px; overflow-y: auto; }
    .tab-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); }
    .tab-item:hover { background: var(--bg-hover); }
    .tab-item.active { background: rgba(99,102,241,0.1); border-left: 3px solid var(--primary); }
    .tab-favicon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .tab-favicon-placeholder { width: 16px; height: 16px; border-radius: 3px; background: var(--bg-card); flex-shrink: 0; }
    .tab-info { flex: 1; min-width: 0; }
    .tab-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-url { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-close { width: 20px; height: 20px; border-radius: 4px; background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.15s; }
    .tab-item:hover .tab-close { opacity: 1; }
    .tab-close:hover { background: var(--error); color: white; }
    
    /* Workspace panel */
    .panel { display: none; padding: 12px 16px; }
    .panel.active { display: block; }
    
    .workspace-input { display: flex; gap: 6px; margin-bottom: 12px; }
    .workspace-input input { flex: 1; padding: 6px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; outline: none; }
    .workspace-input input:focus { border-color: var(--primary); }
    .workspace-input button { padding: 6px 12px; background: var(--primary); border: none; border-radius: 6px; color: white; font-size: 12px; font-weight: 600; cursor: pointer; }
    
    .workspace-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
    .workspace-item .name { font-size: 12px; font-weight: 600; }
    .workspace-item .meta { font-size: 10px; color: var(--text-dim); }
    .workspace-item .btns { display: flex; gap: 4px; }
    .ws-btn { padding: 4px 8px; background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); font-size: 10px; cursor: pointer; }
    .ws-btn:hover { border-color: var(--primary); color: var(--text); }
    .ws-btn.del:hover { border-color: var(--error); color: var(--error); }
    
    /* Settings panel */
    .setting { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .setting-label { font-size: 12px; }
    .setting-desc { font-size: 10px; color: var(--text-dim); }
    .toggle { width: 36px; height: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; position: relative; cursor: pointer; }
    .toggle::after { content: ''; width: 14px; height: 14px; background: var(--text-dim); border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
    .toggle.on { background: var(--primary); border-color: var(--primary); }
    .toggle.on::after { left: 18px; background: white; }
    
    /* Pro badge */
    .pro-badge { display: inline-block; background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 4px; }
    
    /* Stats bar */
    .stats-bar { display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid var(--border); }
    .stat-item { text-align: center; }
    .stat-value { font-size: 16px; font-weight: 800; color: var(--primary-light); }
    .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
    
    .empty { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 12px; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ Smart <span>Tab Manager</span></div>
    <span class="tab-count" id="tabCount">0 tabs</span>
  </div>

  <div class="nav">
    <button class="active" onclick="showPanel('tabs')">📋 Tabs</button>
    <button onclick="showPanel('workspaces')">💾 Workspaces</button>
    <button onclick="showPanel('settings')">⚙️ Settings</button>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-value" id="totalTabs">0</div><div class="stat-label">Tabs</div></div>
    <div class="stat-item"><div class="stat-value" id="totalGroups">0</div><div class="stat-label">Groups</div></div>
    <div class="stat-item"><div class="stat-value" id="duplicateCount">0</div><div class="stat-label">Dupes</div></div>
  </div>

  <!-- TABS PANEL -->
  <div id="panel-tabs" class="panel active" style="padding:0">
    <div class="actions">
      <button class="action-btn primary" onclick="groupAll()">Auto Group</button>
      <button class="action-btn" onclick="ungroupAll()">Ungroup</button>
      <button class="action-btn danger" onclick="closeDuplicates()">Close Dupes</button>
    </div>
    <div class="tab-list" id="tabList"></div>
  </div>

  <!-- WORKSPACES PANEL -->
  <div id="panel-workspaces" class="panel">
    <div class="workspace-input">
      <input type="text" id="wsName" placeholder="Workspace name..." />
      <button onclick="saveWorkspace()">💾 Save</button>
    </div>
    <div id="workspaceList"></div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="panel-settings" class="panel">
    <div class="setting">
      <div><div class="setting-label">Auto-Group Tabs</div><div class="setting-desc">Automatically group tabs by category</div></div>
      <div class="toggle" id="toggleAutoGroup" onclick="toggleSetting('autoGroupEnabled')"></div>
    </div>
    <div class="setting">
      <div><div class="setting-label">Auto-Suspend <span class="pro-badge">PRO</span></div><div class="setting-desc">Suspend inactive tabs to save memory</div></div>
      <div class="toggle" id="toggleAutoSuspend" onclick="toggleSetting('autoSuspendEnabled')"></div>
    </div>
    <div class="setting">
      <div><div class="setting-label">Badge Count</div><div class="setting-desc">Show tab count on extension icon</div></div>
      <div class="toggle on" id="toggleBadge" onclick="toggleSetting('badgeEnabled')"></div>
    </div>
    <div style="margin-top:1rem; text-align:center">
      <a href="#" style="color:var(--primary-light);font-size:12px;text-decoration:none" id="upgradeBtn">⭐ Upgrade to Pro — $3.99/mo</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
